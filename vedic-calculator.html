<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Nāma Anālytics - Business Name Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FFD700;
            --secondary: #FF69B4;
            --accent: #8B4789;
            --dark-bg: #0F172A;
            --purple-dark: #3D1B7C;
            --purple-light: #7C3AED;
            --border-color: rgba(147, 112, 219, 0.3);
            --text-light: #E0E7FF;
            --text-muted: #A78BFA;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, #0F172A 0%, #3D1B7C 25%, #1E1B4B 75%, #0F172A 100%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            position: relative;
        }

        /* Animated background elements */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            top: 5%;
            left: 10%;
            background: radial-gradient(circle, #8B5CF6, transparent);
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: 10%;
            right: 5%;
            background: radial-gradient(circle, #3B82F6, transparent);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #FFD700, #C0A080, #FFB6C1, #FFD700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .sparkle {
            font-size: 1.5rem;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-style: italic;
            letter-spacing: 2px;
        }

        /* Input Section */
        .input-section {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .input-section:hover {
            border-color: rgba(147, 112, 219, 0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.8rem;
            padding: 0.9rem 1rem;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
        }

        input::placeholder {
            color: rgba(147, 112, 219, 0.5);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .helper-text {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.4rem;
            font-style: italic;
        }

        .analyze-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF69B4);
            background-size: 200% auto;
            color: #0F172A;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.8rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            margin-top: 1rem;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            animation: fadeIn 0.6s ease-out;
        }

        .empty-state p:first-child {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .empty-state p:last-child {
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Results Section */
        .results {
            animation: fadeInUp 0.8s ease-out;
        }

        .results-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .results-card:hover {
            border-color: rgba(147, 112, 219, 0.5);
        }

        .business-name-display {
            font-size: 2.5rem;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.8rem;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .stat-label {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .stat-value {
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
        }

        /* Compatibility Score */
        .compatibility-section {
            margin: 2rem 0;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .score-label {
            color: var(--text-light);
            font-weight: bold;
        }

        .score-value {
            font-size: 2rem;
            color: var(--primary);
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FF69B4);
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* Info Box */
        .info-box {
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 0.8rem;
            padding: 1.2rem;
            margin: 1.5rem 0;
        }

        .info-box-title {
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .info-box-content {
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Section Title */
        .section-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        /* Business Sectors */
        .sectors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .sector-card {
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.8rem;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            color: var(--text-light);
        }

        .sector-card:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        /* Recommendations */
        .recommendations {
            display: grid;
            gap: 1rem;
        }

        .recommendation {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.8rem;
            border-left: 3px solid var(--primary);
            transition: all 0.3s ease;
        }

        .recommendation:hover {
            background: rgba(255, 215, 0, 0.08);
        }

        .recommendation-number {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .recommendation-text {
            color: var(--text-light);
            line-height: 1.6;
            flex: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            margin-top: 2rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-title {
                font-size: 2rem;
            }

            .business-name-display {
                font-size: 1.8rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .input-section {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 1.5rem;
                gap: 0.5rem;
            }

            .sparkle {
                font-size: 1rem;
                display: none;
            }

            .business-name-display {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .sectors-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <span class="sparkle">✨</span>
                Vedic Nāma Anālytics
                <span class="sparkle">✨</span>
            </div>
            <p class="header-subtitle">Business Name Astrological Alignment</p>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="form-group">
                <label for="businessName">Business Name</label>
                <input 
                    type="text" 
                    id="businessName" 
                    placeholder="Enter your business name..."
                    onkeypress="if(event.key==='Enter') analyzeVibration()"
                >
            </div>

            <div class="form-group">
                <label for="founderBirth">Founder's Birth Date (Optional)</label>
                <input 
                    type="date" 
                    id="founderBirth"
                >
                <p class="helper-text">Helps calculate personal number compatibility</p>
            </div>

            <button class="analyze-btn" onclick="analyzeVibration()">
                ✨ Analyze Vibration ✨
            </button>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer"></div>
    </div>

    <script>
        // Vedic Numerology Data
        const planetaryInfo = {
            1: { planet: 'Surya (Sun)', color: '#FFD700', element: 'Fire', traits: 'Leadership, Authority, Independence', compatible: 'Power, Creativity, Uniqueness' },
            2: { planet: 'Chandra (Moon)', color: '#C0C0C0', element: 'Water', traits: 'Intuition, Emotion, Balance', compatible: 'Harmony, Creativity, Growth' },
            3: { planet: 'Guru (Jupiter)', color: '#A0522D', element: 'Fire', traits: 'Expansion, Wisdom, Fortune', compatible: 'Education, Publishing, Spirituality' },
            4: { planet: 'Rahu (North Node)', color: '#8B0000', element: 'Air', traits: 'Innovation, Unconventional, Ambition', compatible: 'Technology, Transformation, Evolution' },
            5: { planet: 'Budha (Mercury)', color: '#228B22', element: 'Air', traits: 'Communication, Intellect, Commerce', compatible: 'Business, Trading, Information' },
            6: { planet: 'Shukra (Venus)', color: '#FF69B4', element: 'Water', traits: 'Beauty, Harmony, Prosperity', compatible: 'Luxury, Fashion, Entertainment' },
            7: { planet: 'Ketu (South Node)', color: '#4B0082', element: 'Air', traits: 'Spirituality, Karma, Mysticism', compatible: 'Wellness, Spirituality, Occult' },
            8: { planet: 'Shani (Saturn)', color: '#2F4F4F', element: 'Earth', traits: 'Structure, Discipline, Challenges', compatible: 'Construction, Real Estate, Services' },
            9: { planet: 'Mangal (Mars)', color: '#FF4500', element: 'Fire', traits: 'Courage, Action, Energy', compatible: 'Sports, Defense, Innovation' }
        };

        const businessCompatibility = {
            1: ['Technology Startups', 'Leadership Consulting', 'E-commerce', 'Real Estate Development', 'Entertainment'],
            2: ['Hospitality', 'Catering', 'Travel & Tourism', 'Art & Design', 'Wellness'],
            3: ['Publishing', 'Education', 'Legal Services', 'Philanthropy', 'Coaching'],
            4: ['Tech Innovation', 'Startups', 'Research', 'Digital Marketing', 'Renewable Energy'],
            5: ['Trading Companies', 'Media', 'Advertising', 'Software Development', 'Consulting'],
            6: ['Fashion', 'Jewelry', 'Beauty & Cosmetics', 'Interior Design', 'Luxury Goods'],
            7: ['Yoga Studios', 'Meditation Centers', 'Alternative Medicine', 'Spirituality', 'Psychology'],
            8: ['Construction', 'Mining', 'Real Estate', 'Manufacturing', 'Agriculture'],
            9: ['Sports', 'Fitness', 'Defense Equipment', 'Automotive', 'Chemical Industries']
        };

        const recommendations = {
            1: [
                'Your business name radiates leadership energy - ideal for pioneering ventures',
                'Focus on innovation and taking the first mover advantage in your market',
                'Leverage the authority of your brand name in marketing',
                'Best launch dates: Sundays during Uttaraphalguni nakshatra'
            ],
            2: [
                'Your name carries emotional resonance - build strong customer connections',
                'Emphasize harmony and emotional intelligence in brand messaging',
                'Foster cooperative partnerships and team unity',
                'Best launch dates: Mondays during Rohini nakshatra'
            ],
            3: [
                'Excellent numerology for expansion and growth-oriented businesses',
                'Invest in education and knowledge sharing as part of your brand',
                'Your name attracts good fortune - maintain ethical practices',
                'Best launch dates: Thursdays during Punarvasu nakshatra'
            ],
            4: [
                'Your name is unconventional - perfect for disruptive innovation',
                'Embrace technology and forward-thinking strategies',
                'Challenge industry norms and set new standards',
                'Best launch dates: Tuesdays during Shatabhisha nakshatra'
            ],
            5: [
                'Excellent for commerce and communication-based businesses',
                'Your name is naturally mercantile - leverage networking and partnerships',
                'Focus on information, trading, and intellectual services',
                'Best launch dates: Wednesdays during Ashlesha nakshatra'
            ],
            6: [
                'Your name attracts beauty and prosperity - perfect for luxury brands',
                'Emphasize aesthetics, quality, and refined customer experience',
                'The name creates harmony and attracts loyal clientele',
                'Best launch dates: Fridays during Bharani nakshatra'
            ],
            7: [
                'Deep spiritual resonance - ideal for wellness and spiritual enterprises',
                'Build trust through authentic, purpose-driven messaging',
                'Your name suggests karmic alignment with your mission',
                'Best launch dates: Saturdays during Moola nakshatra'
            ],
            8: [
                'Strong structural energy - suited for solid, long-term businesses',
                'Build on discipline, hard work, and systematic approaches',
                'Patience will reward this name with lasting success',
                'Best launch dates: Saturdays during Pushya nakshatra'
            ],
            9: [
                'Powerful completion energy - suited for transformation-focused ventures',
                'Your name carries dynamic, action-oriented vibrations',
                'Ideal for leadership positions and high-energy industries',
                'Best launch dates: Tuesdays during Kritika nakshatra'
            ]
        };

        // Get letter value
        function getLetterValue(char) {
            const values = {
                a: 1, b: 2, c: 3, d: 4, e: 5, f: 6, g: 7, h: 8, i: 9,
                j: 1, k: 2, l: 3, m: 4, n: 5, o: 6, p: 7, q: 8, r: 9,
                s: 1, t: 2, u: 3, v: 4, w: 5, x: 6, y: 7, z: 8
            };
            return values[char.toLowerCase()] || 0;
        }

        // Calculate root number
        function calculateRootNumber(value) {
            while (value > 9) {
                value = Math.floor(value / 10) + (value % 10);
            }
            return value;
        }

        // Analyze vibration
        function analyzeVibration() {
            const businessName = document.getElementById('businessName').value.trim();
            
            if (!businessName) {
                alert('Please enter a business name');
                return;
            }

            // Calculate name value
            let nameValue = 0;
            for (let char of businessName) {
                nameValue += getLetterValue(char);
            }

            const rootNumber = calculateRootNumber(nameValue);
            const info = planetaryInfo[rootNumber];

            // Calculate birth number
            let birthNumber = 1;
            const founderBirth = document.getElementById('founderBirth').value;
            if (founderBirth) {
                const birthValue = parseInt(founderBirth.split('-')[2]) || 1;
                birthNumber = calculateRootNumber(birthValue);
            }

            // Calculate compatibility
            const compatibility = Math.max(
                60 + Math.abs(rootNumber - birthNumber) * 3,
                Math.min(95, 75 + Math.floor(Math.random() * 20))
            );

            // Display results
            displayResults({
                businessName,
                nameValue,
                rootNumber,
                birthNumber,
                compatibility,
                planet: info.planet,
                color: info.color,
                element: info.element,
                traits: info.traits,
                compatibleBusiness: businessCompatibility[rootNumber],
                recommendations: recommendations[rootNumber]
            });
        }

        // Display results
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            const sectorsHTML = results.compatibleBusiness
                .map(sector => `<div class="sector-card">${sector}</div>`)
                .join('');

            const recsHTML = results.recommendations
                .map((rec, idx) => `
                    <div class="recommendation">
                        <div class="recommendation-number">${idx + 1}</div>
                        <div class="recommendation-text">${rec}</div>
                    </div>
                `)
                .join('');

            container.innerHTML = `
                <div class="results">
                    <!-- Main Results Card -->
                    <div class="results-card">
                        <div class="business-name-display">"${results.businessName}"</div>

                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            <div class="stat-box">
                                <span class="stat-label">Numerical Value</span>
                                <div class="stat-value">${results.nameValue}</div>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Root Number</span>
                                <div class="stat-value">${results.rootNumber}</div>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Governing Planet</span>
                                <div class="stat-value" style="font-size: 1.2rem;">${results.planet}</div>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Element</span>
                                <div class="stat-value" style="font-size: 1.2rem;">${results.element}</div>
                            </div>
                        </div>

                        <!-- Compatibility Score -->
                        <div class="compatibility-section">
                            <div class="score-header">
                                <span class="score-label">Auspiciousness Score</span>
                                <span class="score-value">${results.compatibility}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 0%;" id="progressFill"></div>
                            </div>
                        </div>

                        <!-- Planetary Traits -->
                        <div class="info-box">
                            <div class="info-box-title">Planetary Traits</div>
                            <div class="info-box-content">${results.traits}</div>
                        </div>
                    </div>

                    <!-- Compatible Business Types -->
                    <div class="results-card">
                        <div class="section-title">✨ Optimal Business Sectors</div>
                        <div class="sectors-grid">
                            ${sectorsHTML}
                        </div>
                    </div>

                    <!-- Recommendations -->
                    <div class="results-card">
                        <div class="section-title">🌙 Sacred Recommendations</div>
                        <div class="recommendations">
                            ${recsHTML}
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="footer">
                        <p>✦ This analysis is based on traditional Vedic numerology principles. Consult with a Jyotisha (Vedic astrologer) for comprehensive business guidance. ✦</p>
                    </div>
                </div>
            `;

            // Animate progress bar
            setTimeout(() => {
                document.getElementById('progressFill').style.width = results.compatibility + '%';
            }, 100);

            // Scroll to results
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Initialize empty state
        window.addEventListener('load', () => {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <p>Enter your business name to reveal its cosmic vibration</p>
                    <p>✦ Based on ancient Vedic numerology principles ✦</p>
                </div>
            `;
        });
    </script>
</body>
</html>
